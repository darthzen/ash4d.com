name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "Dockerfile"
      - ".github/workflows/build-and-push.yaml"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/darthzen/ash4d:latest
            ghcr.io/darthzen/ash4d:${{ steps.sha.outputs.short }}

      - name: Pin new image tag in deploy manifest
        run: |
          sed -i "s|image: ghcr.io/darthzen/ash4d:.*|image: ghcr.io/darthzen/ash4d:${{ steps.sha.outputs.short }}|" deploy/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/deployment.yaml
          git diff --cached --quiet || git commit -m "deploy: pin image to ${{ steps.sha.outputs.short }}"
          git push
