<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" style="background: #0f172a; border-radius: 12px;">
  <title>ash4d.com Architecture — Private AI Platform on Multi-Cluster k3s</title>
  <desc>Architecture diagram showing a home lab k3s cluster with AI/ML workloads connected to a GCP k3s cluster via Tailscale, managed by Fleet GitOps.</desc>

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" letter-spacing="0.5">ash4d.com — Private AI Platform</text>
  <text x="600" y="65" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Multi-Cluster Kubernetes · Local LLM Inference · RAG · Agentic MCP Tooling · Fleet GitOps</text>

